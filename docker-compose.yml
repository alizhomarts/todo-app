services:
  db:
    image: postgres:latest
    container_name: todo-db-container
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todo-network

  app:
    build: .
    container_name: todo-app-container
    ports:
      - "8888:8888"
    environment:
      - APP_PORT=8888
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=todo_db
      - JWT_ACCESS_SECRET=supersecretkey
      - JWT_REFRESH_SECRET=supersecretkey123
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge